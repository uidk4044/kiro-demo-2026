name: 自动代码审查和合并

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: 安装 cppcheck
        run: sudo apt-get install -y cppcheck python3 python3-pip

      - name: 安装 MISRA 插件
        run: |
          wget -q https://raw.githubusercontent.com/danmar/cppcheck/main/addons/misra.py -O /usr/local/bin/misra.py
          wget -q https://raw.githubusercontent.com/danmar/cppcheck/main/addons/cppcheckdata.py -O /usr/local/bin/cppcheckdata.py

      - name: cppcheck + MISRA C 2012 静态分析
        id: cppcheck
        run: |
          C_FILES=$(find . -name "*.c" -o -name "*.cpp" -o -name "*.h" | grep -v node_modules | tr '\n' ' ')
          if [ -n "$C_FILES" ]; then
            cppcheck --enable=warning,style,performance,portability \
                     --suppress=missingIncludeSystem \
                     --addon=misra \
                     --error-exitcode=0 \
                     --output-file=cppcheck-result.txt \
                     $C_FILES 2>&1 || true
          fi
          cat cppcheck-result.txt 2>/dev/null || true

      - name: 代码审查
        id: code-review
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const headSha = '${{ github.event.pull_request.head.sha }}';
            
            // 读取 cppcheck 结果
            const fs = require('fs');
            let cppcheckOutput = '';
            try {
              cppcheckOutput = fs.readFileSync('cppcheck-result.txt', 'utf8').trim();
            } catch(e) {}
            
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });
            
            const issues = [];
            
            console.log(`=== 开始检查 PR #${prNumber} ===`);
            console.log(`HEAD SHA: ${headSha}`);
            console.log(`文件数量: ${files.length}`);
            
            for (const file of files) {
              console.log(`\n检查文件: ${file.filename}`);
              
              // 跳过 workflow 文件本身
              if (file.filename.startsWith('.github/')) continue;
              
              try {
                const { data: content } = await github.rest.repos.getContent({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: file.filename,
                  ref: headSha
                });
                
                const code = Buffer.from(content.content, 'base64').toString();
                console.log(`文件大小: ${code.length} 字节`);
                console.log(`前100字符: ${code.substring(0, 100)}`);
                
                // 安全检查 (JS/TS)
                const checks = [
                  { pattern: /(const|let|var)\s+\w*API_KEY\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 API_KEY' },
                  { pattern: /(const|let|var)\s+\w*PASSWORD\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 PASSWORD' },
                  { pattern: /(const|let|var)\s+\w*SECRET\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 SECRET' },
                  { pattern: /(const|let|var)\s+\w*TOKEN\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 TOKEN' },
                  { pattern: /console\.log/i, msg: 'console.log 语句' }
                ];

                // C/C++ 安全检查
                const cChecks = [
                  { pattern: /(const\s+char\s*\*|char\s+\w+\[\])\s*\w*API_KEY\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 API_KEY' },
                  { pattern: /(const\s+char\s*\*|char\s+\w+\[\])\s*\w*PASSWORD\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 PASSWORD' },
                  { pattern: /(const\s+char\s*\*|char\s+\w+\[\])\s*\w*SECRET\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 SECRET' },
                  { pattern: /(const\s+char\s*\*|char\s+\w+\[\])\s*\w*TOKEN\w*\s*=\s*["'][^"']+["']/i, msg: '硬编码的 TOKEN' },
                  { pattern: /#define\s+\w*(API_KEY|PASSWORD|SECRET|TOKEN)\w*\s+["'][^"']+["']/i, msg: '硬编码的敏感宏定义' },
                  { pattern: /printf\s*\(.*["'].*%s.*["']/i, msg: '可能泄露敏感信息的 printf' }
                ];

                if (file.filename.endsWith('.c') || file.filename.endsWith('.cpp') || file.filename.endsWith('.h')) {
                  for (const check of cChecks) {
                    if (code.match(check.pattern)) {
                      issues.push(`${file.filename}: ⚠️ ${check.msg}`);
                    }
                  }
                }
                
                for (const check of checks) {
                  if (code.match(check.pattern)) {
                    const issue = `${file.filename}: ⚠️ ${check.msg}`;
                    issues.push(issue);
                    console.log(`✓ 检测到: ${check.msg}`);
                  }
                }
              } catch (error) {
                console.log(`读取失败: ${error.message}`);
              }
            }
            
            console.log(`\n=== 检查完成 ===`);
            console.log(`发现问题数量: ${issues.length}`);
            
            if (issues.length > 0 || cppcheckOutput) {
              const cppcheckSection = cppcheckOutput
                ? `\n\n### 🔬 cppcheck 分析结果\n\`\`\`\n${cppcheckOutput}\n\`\`\``
                : '';

              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⚠️ 代码审查发现问题 - PR #${prNumber}`,
                body: `## 🔍 代码审查结果\n\n在 PR #${prNumber} 中发现以下问题：\n\n${issues.map(i => `- ${i}`).join('\n')}${cppcheckSection}\n\n请修复这些问题后重新提交。`,
                labels: ['code-review', 'automated']
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## ⚠️ 静态代码检查发现 ${issues.length} 个问题\n\n${issues.map(i => `- ${i}`).join('\n')}${cppcheckSection}\n\n> 已创建 Issue #${issue.number}，请修复以上问题后重新提交。`
              });

              throw new Error(`发现代码问题，阻止自动合并`);
            }
            
            console.log('✅ 未发现问题，可以继续');
            return { hasIssues: false };

  auto-merge:
    runs-on: ubuntu-latest
    needs: auto-review
    if: success()
    steps:
      - name: 自动合并
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ github.event.pull_request.number }};
            const branch = '${{ github.event.pull_request.head.ref }}';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: '✅ 代码审查通过，自动合并中...'
            });

            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              merge_method: 'squash'
            });

            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`
              });
            } catch (error) {
              console.log(`删除分支失败: ${error.message}`);
            }
